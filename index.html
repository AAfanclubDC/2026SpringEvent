	<script src="/assets/js/main.js"></script>
	<script>
		function createTopicArticle(topic, works) {
			const article = document.createElement('article');
			article.className = 'box post post-excerpt';

			const header = document.createElement('header');
			const title = document.createElement('h2');
			const titleText = document.createElement('a');
			titleText.textContent = topic;
			title.appendChild(titleText);
			header.appendChild(title);
			article.appendChild(header);

			if (works.length === 0) {
				const empty = document.createElement('p');
				empty.className = 'topic-empty';
				empty.textContent = '尚無投稿';
				article.appendChild(empty);
			}

			works.forEach(work => {
				const button = generateButton(work.src, work.buttonTitle, work.url);
				article.appendChild(button);
			});

			return article;
		}

		async function generateGuild() {
			const content = document.getElementById('content');
			const [eventInfo, playerHashMap, workUserMap] = await Promise.all([
				fetch('./eventInfo.json').then(response => response.json()),
				fetch('./data/playerHashMap.json').then(response => response.json()),
				fetch('./data/workUserMap.json').then(response => response.json())
			]);

			const playerMap = new Map((playerHashMap || []).map(player => [player.hashId, player]));

			const resolvedWorks = (workUserMap || []).map(work => {
				const player = playerMap.get(work.hashId);
				return {
					...work,
					src: player ? player.image : (work.image || 'images/main.png'),
					buttonTitle: work.title,
					url: encodeURI(work.url),
					uid: player ? player.uid : (work.uid || 9999)
				};
			});

			resolvedWorks.sort((a, b) => a.uid - b.uid || a.title.localeCompare(b.title, 'zh-Hant'));

			const renderedTopics = new Set();
			(eventInfo.topics || []).forEach(topic => {
				const topicWorks = resolvedWorks.filter(work => work.topic === topic);
				content.appendChild(createTopicArticle(topic, topicWorks));
				renderedTopics.add(topic);
			});

			const unknownTopicWorks = resolvedWorks.filter(work => !renderedTopics.has(work.topic));
			if (unknownTopicWorks.length > 0) {
				content.appendChild(createTopicArticle('未分類', unknownTopicWorks));
			}
		}

		generateGuild().catch(err => {
			console.error('載入活動首頁失敗：', err);
		});
	</script>
